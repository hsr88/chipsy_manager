# Netlify configuration for Chipsy Top Manager
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Directory to change to before building
  base = "."
  # Build command
  command = "npm run build"
  # Directory with built files
  publish = "dist"

# SPA fallback — redirect all routes to index.html for hash routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for caching and performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
